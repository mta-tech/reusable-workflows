name: CD Cloud Run

on:
  workflow_call:
    inputs:
      service:
        description: "Cloud Run service name."
        required: true
        type: string
      region:
        description: "Cloud Run region."
        required: true
        type: string
      image:
        description: "Full image reference."
        required: true
        type: string
      project_id:
        description: "Google Cloud project ID that owns the Cloud Run service."
        required: false
        default: ""
        type: string
      environment:
        description: "Target environment label."
        required: false
        default: ""
        type: string
      enable_summary:
        description: "Publish a deployment summary."
        required: false
        default: true
        type: boolean
    secrets:
      gcp_workload_identity_provider:
        description: "Workload Identity Provider for Google Cloud."
        required: true
      gcp_service_account:
        description: "Google Cloud service account email."
        required: true
    outputs:
      service_url:
        description: "Deployed Cloud Run service URL."
        value: ${{ jobs.deploy.outputs.service_url }}
      deployment_status:
        description: "Deployment result status."
        value: ${{ jobs.deploy.outputs.deployment_status }}
      deployment_message:
        description: "Deployment result message."
        value: ${{ jobs.deploy.outputs.deployment_message }}

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Cloud Run Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      service_url: ${{ steps.result.outputs.service_url }}
      deployment_status: ${{ steps.result.outputs.status }}
      deployment_message: ${{ steps.result.outputs.message }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ inputs.project_id }}
          workload_identity_provider: ${{ secrets.gcp_workload_identity_provider }}
          service_account: ${{ secrets.gcp_service_account }}

      - name: Resolve revision tag
        id: revision_tag
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_REF="${{ inputs.image }}"
          IMAGE_TAG=""
          if [[ "$IMAGE_REF" != *@* ]] && [[ "$IMAGE_REF" == *:* ]]; then
            IMAGE_TAG="${IMAGE_REF##*:}"
          fi

          if [ -z "$IMAGE_TAG" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "image_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REVISION_TAG="$(printf '%s' "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
          if [ -z "$REVISION_TAG" ]; then
            REVISION_TAG="rev"
          fi
          if [[ ! "$REVISION_TAG" =~ ^[a-z] ]]; then
            REVISION_TAG="rev-${REVISION_TAG}"
          fi
          SERVICE_NAME="${{ inputs.service }}"
          MAX_TAG_LENGTH=$((46 - ${#SERVICE_NAME}))
          if [ "$MAX_TAG_LENGTH" -lt 1 ]; then
            echo "Cloud Run service name is too long for traffic tags: $SERVICE_NAME"
            exit 1
          fi
          if [ "$MAX_TAG_LENGTH" -gt 63 ]; then
            MAX_TAG_LENGTH=63
          fi
          REVISION_TAG="${REVISION_TAG:0:$MAX_TAG_LENGTH}"
          REVISION_TAG="$(printf '%s' "$REVISION_TAG" | sed -E 's/-+$//')"
          if [ -z "$REVISION_TAG" ]; then
            REVISION_TAG="rev"
          fi

          echo "tag=${REVISION_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check image availability
        id: image_check
        shell: bash
        run: |
          set +e

          IMAGE_REF="${{ inputs.image }}"
          LOG_FILE="$(mktemp)"
          gcloud artifacts docker images describe "$IMAGE_REF" --format='value(image_summary.fully_qualified_digest)' >"$LOG_FILE" 2>&1
          STATUS=$?
          IMAGE_DIGEST="$(tr -d '\r' <"$LOG_FILE" | tail -n 1)"
          LOG_TEXT="$(cat "$LOG_FILE")"
          rm -f "$LOG_FILE"

          if [ "$STATUS" -eq 0 ]; then
            echo "result=available" >> "$GITHUB_OUTPUT"
            echo "message=Image is available." >> "$GITHUB_OUTPUT"
            echo "image_digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "$LOG_TEXT" | grep -Eqi 'specified image does not exist|requested package does not exist|requested entity was not found|not[ -]?found|image not found'; then
            echo "result=missing_image" >> "$GITHUB_OUTPUT"
            echo "message=Image or tag not found: $IMAGE_REF" >> "$GITHUB_OUTPUT"
            echo "image_digest=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Image availability check failed:"
          printf '%s\n' "$LOG_TEXT"
          exit "$STATUS"

      - name: Deploy to Cloud Run
        id: deploy
        if: steps.image_check.outputs.result == 'available'
        shell: bash
        run: |
          set +e

          ARGS=(
            run deploy "${{ inputs.service }}"
            --image "${{ inputs.image }}"
            --region "${{ inputs.region }}"
            --project "${{ inputs.project_id }}"
            --update-labels "^,^managed-by=github-actions,commit-sha=${{ github.sha }}"
            --format json
          )

          if [ -n "${{ steps.revision_tag.outputs.tag }}" ]; then
            ARGS+=(--tag "${{ steps.revision_tag.outputs.tag }}")
          fi

          LOG_FILE="$(mktemp)"
          gcloud "${ARGS[@]}" >"$LOG_FILE" 2>&1
          STATUS=$?
          cat "$LOG_FILE"

          {
            echo "exit_code=$STATUS"
            echo "log_path=$LOG_FILE"
          } >> "$GITHUB_OUTPUT"

          exit 0

      - name: Classify deployment result
        id: result
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_CHECK_RESULT="${{ steps.image_check.outputs.result }}"
          IMAGE_CHECK_MESSAGE="${{ steps.image_check.outputs.message }}"
          DEPLOY_EXIT_CODE="${{ steps.deploy.outputs.exit_code }}"
          DEPLOY_LOG_PATH="${{ steps.deploy.outputs.log_path }}"

          STATUS=""
          MESSAGE=""
          SHOULD_FAIL="false"
          SERVICE_URL=""

          if [ "$IMAGE_CHECK_RESULT" = "missing_image" ]; then
            STATUS="warning"
            MESSAGE="$IMAGE_CHECK_MESSAGE"
          elif [ "${DEPLOY_EXIT_CODE:-}" = "0" ]; then
            STATUS="success"
            MESSAGE="Deployed to Cloud Run."
            SERVICE_URL="$(gcloud run services describe "${{ inputs.service }}" --region "${{ inputs.region }}" --project "${{ inputs.project_id }}" --format='value(status.url)')"
          else
            DEPLOY_LOG=""
            if [ -n "${DEPLOY_LOG_PATH:-}" ] && [ -f "$DEPLOY_LOG_PATH" ]; then
              DEPLOY_LOG="$(cat "$DEPLOY_LOG_PATH")"
            fi

            if printf '%s' "$DEPLOY_LOG" | grep -Eqi "Image '.*' not found|manifest unknown|name unknown"; then
              STATUS="warning"
              MESSAGE="Image or tag not found: ${{ inputs.image }}"
            else
              STATUS="failure"
              MESSAGE="Cloud Run deployment failed."
              SHOULD_FAIL="true"
            fi
          fi

          {
            echo "status=$STATUS"
            echo "message=$MESSAGE"
            echo "should_fail=$SHOULD_FAIL"
            echo "service_url=$SERVICE_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Cleanup deploy log
        if: always() && steps.deploy.outputs.log_path != ''
        shell: bash
        run: rm -f "${{ steps.deploy.outputs.log_path }}"

      - name: Summary
        if: inputs.enable_summary
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG_VALUE="${{ steps.revision_tag.outputs.image_tag }}"
          if [ -z "$IMAGE_TAG_VALUE" ]; then
            IMAGE_TAG_VALUE="${{ inputs.image }}"
          fi
          RESULT_STATUS="${{ steps.result.outputs.status }}"
          RESULT_MESSAGE="${{ steps.result.outputs.message }}"

          case "$RESULT_STATUS" in
            success)
              STATUS_TEXT="✅ Deployed to Cloud Run"
              ;;
            warning)
              STATUS_TEXT="⚠️ Skipped"
              ;;
            *)
              STATUS_TEXT="❌ Deployment Failed"
              ;;
          esac

          ENVIRONMENT_LABEL="${{ inputs.environment }}"
          case "$ENVIRONMENT_LABEL" in
            development) REPORT_TITLE="Development" ;;
            staging) REPORT_TITLE="Staging" ;;
            production) REPORT_TITLE="Production" ;;
            *)
              REPORT_TITLE="${ENVIRONMENT_LABEL:-Cloud Run}"
              ;;
          esac

          {
            echo "### ${REPORT_TITLE} Deployment Report"
            echo ""
            echo "| Service | Status | Image Tag | Notes |"
            echo "| --- | --- | --- | --- |"
            echo "| ${{ inputs.service }} | ${STATUS_TEXT} | \`${IMAGE_TAG_VALUE}\` | ${RESULT_MESSAGE} |"
            echo ""
            echo "- Region: ${{ inputs.region }}"
            if [ -n "${{ inputs.project_id }}" ]; then
              echo "- Project: ${{ inputs.project_id }}"
            fi
            if [ -n "${{ inputs.environment }}" ]; then
              echo "- Environment: \`${{ inputs.environment }}\`"
            fi
            echo "- Image: \`${{ inputs.image }}\`"
            if [ -n "${{ steps.revision_tag.outputs.tag }}" ]; then
              echo "- Revision tag: \`${{ steps.revision_tag.outputs.tag }}\`"
            fi
            if [ -n "${{ steps.image_check.outputs.image_digest }}" ]; then
              echo "- Image digest: \`${{ steps.image_check.outputs.image_digest }}\`"
            fi
            if [ -n "${{ steps.result.outputs.service_url }}" ]; then
              echo "- URL: ${{ steps.result.outputs.service_url }}"
            fi
            echo ""
            echo "_Job summary generated at run-time_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Emit warning annotation
        if: steps.result.outputs.status == 'warning'
        shell: bash
        run: echo "::warning title=Cloud Run deployment skipped::${{ steps.result.outputs.message }}"

      - name: Fail on blocking deployment error
        if: steps.result.outputs.should_fail == 'true'
        shell: bash
        run: |
          echo "${{ steps.result.outputs.message }}"
          exit 1
