name: CI Change Detection

on:
  workflow_call:
    outputs:
      services:
        description: 'JSON array of changed service paths'
        value: ${{ jobs.detect.outputs.services }}
      service_count:
        description: 'Number of changed services'
        value: ${{ jobs.detect.outputs.service_count }}
      version_tag:
        description: 'Generated version tag for release/hotfix'
        value: ${{ jobs.detect.outputs.version_tag }}
      environment:
        description: 'Detected environment (development/staging/production)'
        value: ${{ jobs.detect.outputs.environment }}

jobs:
  detect:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      service_count: ${{ steps.changes.outputs.service_count }}
      version_tag: ${{ steps.tag.outputs.version_tag }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Environment
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == feat/* ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == release/* ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == hotfix/* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Generate Version Tag (Staging)
        id: tag
        if: github.ref_name == 'release/*' || github.ref_name == 'hotfix/*'
        run: |
          if [[ "${{ github.ref_name }}" == release/* ]]; then
            # Staging: use branch name as tag (e.g., v26.3.0)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#release/}"
            echo "version_tag=$VERSION" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == hotfix/* ]]; then
            # Hotfix: get latest tag and increment
            LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              HOTFIX_VERSION="v1.0.0-hotfix-1"
            else
              HOTFIX_NUM=$(git tag -l "${LATEST_TAG}-hotfix-*" | wc -l)
              HOTFIX_VERSION="${LATEST_TAG}-hotfix-$((HOTFIX_NUM + 1))"
            fi
            echo "version_tag=$HOTFIX_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Detect Changed Services
        id: changes
        run: |
          BASE_SHA="${{ github.event.before }}"
          # For first push or empty base, use last commit
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${{ github.event.head_commit.id }}~1"
          fi

          # Detect changes in apps/ and services/ directories
          CHANGED_SERVICES=$(git diff --name-only "$BASE_SHA" ${{ github.sha }} | grep -E '^apps/|^services/' | cut -d'/' -f1-2 | sort -u || echo "")

          if [ -z "$CHANGED_SERVICES" ]; then
            echo "No service changes detected"
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "service_count=0" >> $GITHUB_OUTPUT
          else
            SERVICES_JSON=$(echo "$CHANGED_SERVICES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            SERVICE_COUNT=$(echo "$SERVICES_JSON" | jq 'length')
            echo "services=$SERVICES_JSON" >> $GITHUB_OUTPUT
            echo "service_count=$SERVICE_COUNT" >> $GITHUB_OUTPUT
            echo "Changed services ($SERVICE_COUNT):"
            echo "$CHANGED_SERVICES"
          fi

      - name: Summary
        run: |
          echo "### Change Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changed Services:** ${{ steps.changes.outputs.service_count }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.tag.outputs.version_tag }}" ]; then
            echo "- **Version Tag:** ${{ steps.tag.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          fi
