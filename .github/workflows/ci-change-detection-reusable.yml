name: CI Change Detection

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment. If empty, derived from branch name."
        required: false
        default: ""
        type: string
      service_roots:
        description: "JSON array of monorepo service roots."
        required: false
        default: '["services","apps"]'
        type: string
      shared_paths:
        description: "JSON array of paths that should rebuild all services when changed."
        required: false
        default: '[".github","libs","packages"]'
        type: string
      service_path:
        description: "Fixed service path for single-service repositories."
        required: false
        default: ""
        type: string
      version_tag:
        description: "Explicit version tag override."
        required: false
        default: ""
        type: string
    outputs:
      services:
        description: "JSON array of changed service paths."
        value: ${{ jobs.detect.outputs.services }}
      service_matrix:
        description: "JSON array of objects with service_path and service_name."
        value: ${{ jobs.detect.outputs.service_matrix }}
      service_count:
        description: "Number of changed services."
        value: ${{ jobs.detect.outputs.service_count }}
      changed:
        description: "Whether at least one service changed."
        value: ${{ jobs.detect.outputs.changed }}
      version_tag:
        description: "Generated or supplied version tag."
        value: ${{ jobs.detect.outputs.version_tag }}
      environment:
        description: "Resolved environment."
        value: ${{ jobs.detect.outputs.environment }}

permissions:
  contents: read

jobs:
  detect:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      service_matrix: ${{ steps.changes.outputs.service_matrix }}
      service_count: ${{ steps.changes.outputs.service_count }}
      changed: ${{ steps.changes.outputs.changed }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      environment: ${{ steps.environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve environment
        id: environment
        shell: bash
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == feat/* ]]; then
            ENVIRONMENT="development"
          elif [[ "$BRANCH" == release/* ]]; then
            ENVIRONMENT="staging"
          elif [[ "$BRANCH" == hotfix/* ]] || [[ "$BRANCH" == main ]] || [[ "$BRANCH" == master ]]; then
            ENVIRONMENT="production"
          else
            ENVIRONMENT="development"
          fi

          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"

      - name: Resolve version tag
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            echo "version_tag=${{ inputs.version_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="${{ github.ref_name }}"
          VERSION_TAG=""

          if [[ "$BRANCH" == release/* ]]; then
            VERSION_TAG="${BRANCH#release/}"
          elif [[ "$BRANCH" == hotfix/* ]]; then
            BASE_VERSION="${BRANCH#hotfix/}"
            if [ -z "$BASE_VERSION" ] || [ "$BASE_VERSION" = "$BRANCH" ]; then
              BASE_VERSION="$(git tag -l 'v*' | sort -V | tail -1)"
            fi
            if [ -z "$BASE_VERSION" ]; then
              BASE_VERSION="v1.0.0"
            fi

            HOTFIX_PREFIX="${BASE_VERSION}-hotfix-"
            EXISTING_HOTFIX_NUMBERS="$(
              git tag -l "${HOTFIX_PREFIX}*" \
                | sed -E "s/^${HOTFIX_PREFIX}([0-9]+)$/\\1/" \
                | grep -E '^[0-9]+$' \
                || true
            )"

            if [ -z "$EXISTING_HOTFIX_NUMBERS" ]; then
              NEXT_HOTFIX_NUMBER=1
            else
              MAX_HOTFIX_NUMBER="$(printf '%s\n' "$EXISTING_HOTFIX_NUMBERS" | sort -n | tail -1)"
              NEXT_HOTFIX_NUMBER="$((MAX_HOTFIX_NUMBER + 1))"
            fi

            VERSION_TAG="${HOTFIX_PREFIX}${NEXT_HOTFIX_NUMBER}"
          fi

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Detect changed services
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.service_path }}" ]; then
            SERVICE_PATH="${{ inputs.service_path }}"
            SERVICE_NAME="$(basename "$SERVICE_PATH")"
            printf 'services=["%s"]\n' "$SERVICE_PATH" >> "$GITHUB_OUTPUT"
            printf 'service_matrix=[{"service_path":"%s","service_name":"%s"}]\n' "$SERVICE_PATH" "$SERVICE_NAME" >> "$GITHUB_OUTPUT"
            echo "service_count=1" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVICE_ROOTS='${{ inputs.service_roots }}'
          SHARED_PATHS='${{ inputs.shared_paths }}'

          echo "$SERVICE_ROOTS" | jq -e 'type == "array"' >/dev/null
          echo "$SHARED_PATHS" | jq -e 'type == "array"' >/dev/null

          BASE_SHA="${{ github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          if [ -z "$BASE_SHA" ]; then
            CHANGED_FILES="$(git ls-files)"
          else
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" || true)"
          fi

          export SERVICE_ROOTS_JSON="$SERVICE_ROOTS"
          export SHARED_PATHS_JSON="$SHARED_PATHS"
          export CHANGED_FILES_DATA="$CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            SERVICE_MATRIX_JSON="[]"
          else
            REBUILD_ALL=false
            while IFS= read -r changed; do
              [ -z "$changed" ] && continue
              while IFS= read -r shared; do
                [ -z "$shared" ] && continue
                shared="${shared%/}"
                if [ "$changed" = "$shared" ] || [[ "$changed" == "$shared/"* ]]; then
                  REBUILD_ALL=true
                  break 2
                fi
              done < <(echo "$SHARED_PATHS_JSON" | jq -r '.[]')
            done < <(printf '%s\n' "$CHANGED_FILES")

            if [ "$REBUILD_ALL" = "true" ]; then
              SERVICES_JSON="$(
                while IFS= read -r root; do
                  [ -d "$root" ] || continue
                  find "$root" -mindepth 1 -maxdepth 1 -type d | sort
                done < <(echo "$SERVICE_ROOTS_JSON" | jq -r '.[]') \
                  | jq -Rsc 'split("\n") | map(select(length > 0)) | unique'
              )"
            else
              SERVICE_ROOTS_FOR_AWK="$(echo "$SERVICE_ROOTS_JSON" | jq -r 'join(" ")')"
              SERVICES_JSON="$(
                printf '%s\n' "$CHANGED_FILES" \
                  | awk -F/ -v roots="$SERVICE_ROOTS_FOR_AWK" '
                      BEGIN {
                        split(roots, values, " ")
                        for (i in values) {
                          allowed[values[i]] = 1
                        }
                      }
                      NF >= 2 && ($1 in allowed) {
                        print $1 "/" $2
                      }
                    ' \
                  | sort -u \
                  | jq -Rsc 'split("\n") | map(select(length > 0))'
              )"
            fi

            SERVICE_MATRIX_JSON="$(echo "$SERVICES_JSON" | jq -c 'map({service_path: ., service_name: (split("/") | last)})')"
          fi

          SERVICES_JSON="$(echo "$SERVICE_MATRIX_JSON" | jq -c 'map(.service_path)')"
          SERVICE_COUNT="$(echo "$SERVICES_JSON" | jq 'length')"
          if [ "$SERVICE_COUNT" -gt 0 ]; then
            CHANGED=true
          else
            CHANGED=false
          fi

          echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
          echo "service_matrix=$SERVICE_MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "service_count=$SERVICE_COUNT" >> "$GITHUB_OUTPUT"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Change Detection"
            echo ""
            echo "- Environment: ${{ steps.environment.outputs.environment }}"
            echo "- Changed: ${{ steps.changes.outputs.changed }}"
            echo "- Service count: ${{ steps.changes.outputs.service_count }}"
            echo "- Services: \`${{ steps.changes.outputs.services }}\`"
            if [ -n "${{ steps.version.outputs.version_tag }}" ]; then
              echo "- Version tag: \`${{ steps.version.outputs.version_tag }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
