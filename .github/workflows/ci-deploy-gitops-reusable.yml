name: CD - GitOps Deploy (Reusable)

on:
  workflow_call:
    inputs:
      gitops_repo:
        description: 'GitOps repository (format: owner/repo)'
        required: true
        type: string
      gitops_branch:
        description: 'GitOps branch'
        required: false
        type: string
        default: 'main'
      environment:
        description: 'Target environment (development, staging, production)'
        required: true
        type: string
      services:
        description: 'JSON array of services to deploy (or use artifacts from CI)'
        required: false
        type: string
      download_artifacts:
        description: 'Whether to download build artifacts from CI'
        required: false
        type: boolean
        default: true
      workflow_run_id:
        description: 'CI workflow run ID to download artifacts from'
        required: false
        type: string
      create_git_tag:
        description: 'Whether to create git tags for releases'
        required: false
        type: boolean
        default: false
      tag_prefix:
        description: 'Prefix for git tags'
        required: false
        type: string
        default: 'v'
    outputs:
      deployment_status:
        description: 'Overall deployment status'
        value: ${{ jobs.deploy.outputs.deployment_status }}
      deployed_services:
        description: 'JSON array of deployed services'
        value: ${{ jobs.deploy.outputs.deployed_services }}
      failed_services:
        description: 'JSON array of failed services'
        value: ${{ jobs.deploy.outputs.failed_services }}

    secrets:
      gh_pat:
        description: 'GitHub PAT with repo access for GitOps operations'
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
        default: 'development'
      services:
        description: 'Services to deploy (JSON string)'
        required: false
        type: string

jobs:
  deploy:
    name: Deploy Services via GitOps
    runs-on: [self-hosted, Linux, X64]

    environment: ${{ inputs.environment }}

    permissions:
      contents: write
      id-token: write
      actions: read

    outputs:
      deployment_status: ${{ steps.summary.outputs.status }}
      deployed_services: ${{ steps.summary.outputs.deployed }}
      failed_services: ${{ steps.summary.outputs.failed }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        if: inputs.download_artifacts == true && inputs.workflow_run_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.workflow_run_id }}
          github-token: ${{ secrets.gh_pat }}
          path: build-artifacts

      - name: Validate Artifacts
        id: validate
        if: inputs.download_artifacts == true
        run: |
          if [ ! -d "build-artifacts" ] || [ -z "$(ls -A build-artifacts 2>/dev/null)" ]; then
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
            echo "⚠️ No build artifacts found"
          else
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
            echo "✅ Build artifacts found"
            ls -R build-artifacts
          fi

      - name: Install Required Tools
        run: |
          # Install yq
          if ! command -v yq &> /dev/null; then
            wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Clone GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.gh_pat }}@github.com/${{ inputs.gitops_repo }}.git gitops
          cd gitops
          git checkout ${{ inputs.gitops_branch }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy Services
        id: deploy-services
        if: steps.validate.outputs.has_artifacts == 'true' || inputs.services != ''
        run: |
          GITOPS_DIR="gitops"
          ENVIRONMENT="${{ inputs.environment }}"
          DEPLOYED=()
          FAILED=()

          if [ -n "${{ inputs.services }}" ]; then
            # Use services from input
            echo "$DEPLOYED_JSON" > /tmp/services_to_deploy.json
          else
            # Use artifacts
            for artifact_dir in build-artifacts/build-info-*; do
              [ -d "$artifact_dir" ] || continue

              BUILD_FILE="$artifact_dir/build_info.json"
              if [ ! -f "$BUILD_FILE" ]; then
                echo "⚠️ Missing build_info.json in $artifact_dir"
                continue
              fi

              SERVICE_NAME=$(jq -r '.service_name' "$BUILD_FILE")
              IMAGE_TAG=$(jq -r '.image_tag' "$BUILD_FILE")
              SERVICE_TYPE=$(jq -r '.service_type' "$BUILD_FILE")

              # Get GitOps values file path
              SERVICE_UPPER=$(echo "$SERVICE_NAME" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
              VAR_NAME="GITOPS_VALUES_FILE_PATH_${SERVICE_UPPER}"

              VALUES_PATH="${!VAR_NAME}"

              if [ -z "$VALUES_PATH" ]; then
                echo "⚠️ No GitOps values path for $SERVICE_NAME"
                FAILED+=("$SERVICE_NAME")
                continue
              fi

              echo "Deploying $SERVICE_NAME ($SERVICE_TYPE) to $ENVIRONMENT"
              cd "$GITOPS_DIR"

              # Update image tag in values file
              if [ -f "$VALUES_PATH" ]; then
                yq e ".image.tag = \"$IMAGE_TAG\"" -i "$VALUES_PATH"

                # Update appVersion in Chart.yaml if it's a release
                if [ "${{ inputs.create_git_tag }}" == "true" ]; then
                  VERSION=$(echo "$IMAGE_TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
                  if [ -n "$VERSION" ]; then
                    CHART_PATH=$(dirname "$VALUES_PATH" | sed 's|/values/|/Chart.yaml|')
                    if [ -f "$CHART_PATH" ]; then
                      yq e ".appVersion = \"$VERSION\"" -i "$CHART_PATH"
                    fi
                  fi
                fi

                # Check if there are actual changes
                if git diff --quiet "$VALUES_PATH"; then
                  echo "ℹ️ No changes for $SERVICE_NAME"
                else
                  git add "$VALUES_PATH"
                  CHART_PATH=$(dirname "$VALUES_PATH" | sed 's|/values.yaml|/Chart.yaml|')
                  if [ -f "$CHART_PATH" ]; then
                    git add "$CHART_PATH"
                  fi

                  git commit -m "ci($ENVIRONMENT): deploy ${SERVICE_NAME} ${IMAGE_TAG}"
                  git push

                  DEPLOYED+=("$SERVICE_NAME:$IMAGE_TAG")
                  echo "✅ Deployed $SERVICE_NAME"
                fi
              else
                echo "❌ Values file not found: $VALUES_PATH"
                FAILED+=("$SERVICE_NAME")
              fi

              cd ..
            done
          fi

          # Save results
          echo "deployed=$(printf '%s\n' "${DEPLOYED[@]}" | jq -R . | jq -s -c .)" >> $GITHUB_OUTPUT
          echo "failed=$(printf '%s\n' "${FAILED[@]}" | jq -R . | jq -s -c .)" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        if: inputs.create_git_tag == 'true'
        run: |
          TAG_PREFIX="${{ inputs.tag_prefix }}"
          ENVIRONMENT="${{ inputs.environment }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          git tag "${TAG_PREFIX}${ENVIRONMENT}-${TIMESTAMP}"
          git push origin "${TAG_PREFIX}${ENVIRONMENT}-${TIMESTAMP}"

      - name: Deployment Summary
        id: summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "deployed=${{ steps.deploy-services.outputs.deployed }}" >> $GITHUB_OUTPUT
          echo "failed=${{ steps.deploy-services.outputs.failed }}" >> $GITHUB_OUTPUT

      - name: Generate Deployment Report
        if: always()
        run: |
          echo "## Deployment Report - ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Image Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----------|" >> $GITHUB_STEP_SUMMARY

          if [ -n "${{ steps.deploy-services.outputs.deployed }}" ]; then
            echo "${{ steps.deploy-services.outputs.deployed }}" | jq -r '.[] | "|\(.name)|✅ Deployed|\(.tag)|"' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "${{ steps.deploy-services.outputs.failed }}" ]; then
            echo "${{ steps.deploy-services.outputs.failed }}" | jq -r '.[] | "|\(.name)|❌ Failed|-|"' >> $GITHUB_STEP_SUMMARY
          fi
