name: CI - Notification (Reusable)

on:
  workflow_call:
    inputs:
      status:
        description: 'Workflow status (success, failure, cancelled)'
        required: true
        type: string
      environment:
        description: 'Environment name'
        required: false
        type: string
      workflow_name:
        description: 'Name of the workflow'
        required: false
        type: string
      run_url:
        description: 'URL to the workflow run'
        required: false
        type: string
      actor:
        description: 'User who triggered the workflow'
        required: false
        type: string
      commit_message:
        description: 'Commit message'
        required: false
        type: string
      branch:
        description: 'Branch name'
        required: false
        type: string
      services:
        description: 'JSON array of affected services'
        required: false
        type: string
      custom_message:
        description: 'Custom notification message'
        required: false
        type: string
      notify_on_success:
        description: 'Send notification on success'
        required: false
        type: boolean
        default: true
      notify_on_failure:
        description: 'Send notification on failure'
        required: false
        type: boolean
        default: true

    secrets:
      discord_webhook_url:
        description: 'Discord webhook URL'
        required: false
      slack_webhook_url:
        description: 'Slack webhook URL'
        required: false

  workflow_dispatch:

jobs:
  notify:
    name: Send Notification
    runs-on: [self-hosted, Linux, X64]
    if: |
      (inputs.status == 'success' && inputs.notify_on_success == true) ||
      (inputs.status == 'failure' && inputs.notify_on_failure == true) ||
      inputs.status == 'cancelled'

    steps:
      - name: Prepare Notification Payload
        id: payload
        run: |
          STATUS="${{ inputs.status }}"
          ENVIRONMENT="${{ inputs.environment || 'unknown' }}"
          WORKFLOW_NAME="${{ inputs.workflow_name || 'GitHub Actions' }}"
          ACTOR="${{ inputs.actor || github.actor }}"
          BRANCH="${{ inputs.branch || github.ref_name }}"
          COMMIT_MSG="${{ inputs.commit_message || github.event.head_commit.message }}"
          RUN_URL="${{ inputs.run_url || github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Determine color and emoji based on status
          case "$STATUS" in
            success)
              COLOR="3066993"
              EMOJI="✅"
              TITLE="SUCCESS"
              ;;
            failure)
              COLOR="15158332"
              EMOJI="❌"
              TITLE="FAILED"
              ;;
            cancelled)
              COLOR="16776960"
              EMOJI="⚠️"
              TITLE="CANCELLED"
              ;;
            *)
              COLOR="10181038"
              EMOJI="ℹ️"
              TITLE="INFO"
              ;;
          esac

          # Prepare services list if provided
          SERVICES_LIST=""
          if [ -n "${{ inputs.services }}" ]; then
            SERVICES_LIST=$(echo "${{ inputs.services }}" | jq -r '.[] | "• \(.name): \(.tag // \"N/A\")"' | paste -sd '\n' -)
          fi

          # Build custom message or default
          if [ -n "${{ inputs.custom_message }}" ]; then
            DESCRIPTION="${{ inputs.custom_message }}"
          else
            DESCRIPTION="**Environment:** ${ENVIRONMENT}
**Branch:** \`${BRANCH}\`
**Actor:** ${ACTOR}
**Commit:** ${COMMIT_MSG:0:100}"

            if [ -n "$SERVICES_LIST" ]; then
              DESCRIPTION="${DESCRIPTION}
**Services:**
${SERVICES_LIST}"
            fi
          fi

          # Save to outputs
          echo "title=$EMOJI ${WORKFLOW_NAME} - ${TITLE}" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "url=$RUN_URL" >> $GITHUB_OUTPUT

      - name: Send Discord Notification
        if: secrets.discord_webhook_url != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.discord_webhook_url }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "GitHub Actions",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "embeds": [{
                "title": "${{ steps.payload.outputs.title }}",
                "color": ${{ steps.payload.outputs.color }},
                "description": "${{ steps.payload.outputs.description }}",
                "url": "${{ steps.payload.outputs.url }}"
              }]
            }' || echo "Discord notification failed"

      - name: Send Slack Notification
        if: secrets.slack_webhook_url != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.slack_webhook_url }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "${{ steps.payload.outputs.title }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.payload.outputs.title }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.payload.outputs.description }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ steps.payload.outputs.url }}"
                    }
                  ]
                }
              ]
            }' || echo "Slack notification failed"
