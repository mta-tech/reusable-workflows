name: CI Build

on:
  workflow_call:
    inputs:
      service_path:
        description: "Service path such as services/api or apps/web."
        required: true
        type: string
      environment:
        description: "Target environment."
        required: true
        type: string
      version_tag:
        description: "Explicit release or hotfix version."
        required: false
        default: ""
        type: string
      image_tag:
        description: "Explicit image tag override."
        required: false
        default: ""
        type: string
      push_image:
        description: "Push image to the registry."
        required: false
        default: true
        type: boolean
      enable_test:
        description: "Run the service test job."
        required: false
        default: true
        type: boolean
      enable_security_scan:
        description: "Master switch for security scans."
        required: false
        default: true
        type: boolean
      enable_filesystem_scan:
        description: "Run Trivy filesystem scan before image build."
        required: false
        default: true
        type: boolean
      enable_image_scan:
        description: "Run Trivy image scan after the image is pushed."
        required: false
        default: true
        type: boolean
      upload_security_artifacts:
        description: "Upload Trivy scan reports as workflow artifacts."
        required: false
        default: true
        type: boolean
      upload_build_metadata:
        description: "Upload build metadata artifact."
        required: false
        default: true
        type: boolean
      enable_summary:
        description: "Publish a job summary."
        required: false
        default: true
        type: boolean
      build_args:
        description: "Multiline Docker build args."
        required: false
        default: ""
        type: string
      image_repository:
        description: "Optional full image repository override without the tag."
        required: false
        default: ""
        type: string
      env_file_path:
        description: "Optional env file path to generate before testing and build."
        required: false
        default: ""
        type: string
      env_file_var_name:
        description: "Optional repository or organization variable name that contains the env file content."
        required: false
        default: ""
        type: string
      env_file_secret_name:
        description: "Optional repository or environment secret name that contains the env file content."
        required: false
        default: ""
        type: string
      env_file_content:
        description: "Optional env file content."
        required: false
        default: ""
        type: string
    secrets:
      gcp_workload_identity_provider:
        description: "Workload Identity Provider for Google Cloud."
        required: false
      gcp_service_account:
        description: "Google Cloud service account email."
        required: false
    outputs:
      service_name:
        description: "Resolved service name."
        value: ${{ jobs.metadata.outputs.service_name }}
      image_tag:
        description: "Full image reference."
        value: ${{ jobs.metadata.outputs.image_tag }}
      artifact_name:
        description: "Artifact containing build metadata."
        value: ${{ jobs.metadata.outputs.artifact_name }}
      container_scan_passed:
        description: "Whether the container scan passed."
        value: ${{ jobs.build.outputs.container_scan_passed }}

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve Build Metadata
    runs-on: ubuntu-latest
    outputs:
      service_name: ${{ steps.meta.outputs.service_name }}
      service_type: ${{ steps.meta.outputs.service_type }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_name: ${{ steps.meta.outputs.image_name }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs and resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          SERVICE_PATH="${{ inputs.service_path }}"
          if [ ! -d "$SERVICE_PATH" ]; then
            echo "Service path not found: $SERVICE_PATH"
            exit 1
          fi

          SERVICE_NAME="$(basename "$SERVICE_PATH")"

          if [ -f "$SERVICE_PATH/pom.xml" ]; then
            SERVICE_TYPE="java"
          elif [ -f "$SERVICE_PATH/package.json" ]; then
            SERVICE_TYPE="nodejs"
          elif [ -f "$SERVICE_PATH/pyproject.toml" ] || [ -f "$SERVICE_PATH/requirements.txt" ]; then
            SERVICE_TYPE="python"
          else
            SERVICE_TYPE="unknown"
          fi

          case "${{ inputs.environment }}" in
            development) PROJECT_ID="${{ vars.DOCKER_PROJECT_ID_DEVELOPMENT }}" ;;
            staging) PROJECT_ID="${{ vars.DOCKER_PROJECT_ID_STAGING }}" ;;
            production) PROJECT_ID="${{ vars.DOCKER_PROJECT_ID_PRODUCTION }}" ;;
            *)
              echo "Unsupported environment: ${{ inputs.environment }}"
              exit 1
              ;;
          esac

          REGISTRY_HOST="${{ vars.DOCKER_REGISTRY_HOST }}"
          DOCKER_REPO="${{ vars.DOCKER_REPO_GLOBAL }}"

          if [ -z "$REGISTRY_HOST" ] || [ -z "$DOCKER_REPO" ] || [ -z "$PROJECT_ID" ]; then
            echo "Required Docker vars are missing."
            exit 1
          fi

          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [ -n "${{ inputs.version_tag }}" ]; then
            TAG="${{ inputs.version_tag }}"
          elif [ "${{ inputs.environment }}" = "development" ]; then
            TAG="dev-${GITHUB_SHA::12}"
          else
            TAG="${GITHUB_SHA::12}"
          fi

          if [ -n "${{ inputs.image_repository }}" ]; then
            IMAGE_NAME="${{ inputs.image_repository }}"
          else
            IMAGE_NAME="$REGISTRY_HOST/$PROJECT_ID/$DOCKER_REPO/$SERVICE_NAME"
          fi
          IMAGE_TAG="$IMAGE_NAME:$TAG"

          echo "service_name=$SERVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "service_type=$SERVICE_TYPE" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "artifact_name=build-info-$SERVICE_NAME" >> "$GITHUB_OUTPUT"

  test:
    name: Test Service
    runs-on: ubuntu-latest
    needs: metadata
    if: inputs.enable_test
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        if: needs.metadata.outputs.service_type == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js
        if: needs.metadata.outputs.service_type == 'nodejs'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ inputs.service_path }}/package-lock.json

      - name: Setup Python
        if: needs.metadata.outputs.service_type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate env file
        if: inputs.env_file_path != '' && (inputs.env_file_content != '' || inputs.env_file_var_name != '' || inputs.env_file_secret_name != '')
        env:
          ENV_FILE_CONTENT: ${{ inputs.env_file_content != '' && inputs.env_file_content || (inputs.env_file_secret_name != '' && secrets[inputs.env_file_secret_name]) || (inputs.env_file_var_name != '' && vars[inputs.env_file_var_name]) || '' }}
        shell: bash
        run: |
          if [ -z "$ENV_FILE_CONTENT" ]; then
            echo "Env file content resolved empty for ${{ inputs.env_file_path }}."
            exit 1
          fi
          mkdir -p "$(dirname "${{ inputs.env_file_path }}")"
          printf '%s\n' "$ENV_FILE_CONTENT" > "${{ inputs.env_file_path }}"

      - name: Install dependencies and run tests
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ inputs.service_path }}"

          case "${{ needs.metadata.outputs.service_type }}" in
            java)
              mvn -B test
              ;;
            nodejs)
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
              if npm run | grep -qE '(^| )test'; then
                npm test -- --watch=false
              else
                echo "No npm test script found. Skipping tests."
              fi
              ;;
            python)
              python -m pip install --upgrade pip
              if [ -f requirements.txt ]; then
                pip install -r requirements.txt
              fi
              if [ -f pyproject.toml ]; then
                pip install .
              fi
              if [ -d tests ] || ls test_*.py >/dev/null 2>&1; then
                pip install pytest
                pytest
              else
                echo "No pytest suite found. Skipping tests."
              fi
              ;;
            *)
              echo "Unknown service type. No tests executed."
              ;;
          esac

  security:
    name: Filesystem Security Scan
    runs-on: ubuntu-latest
    needs: metadata
    if: inputs.enable_security_scan && inputs.enable_filesystem_scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/trivy"
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.65.0 \
            fs \
            --scanners vuln \
            --format json \
            --severity CRITICAL,HIGH \
            --pkg-types os,library \
            --output /workspace/trivy-fs-report.json \
            "/workspace/${{ inputs.service_path }}"

      - name: Summarize filesystem scan
        id: fs_summary
        shell: bash
        run: |
          set -euo pipefail
          CRITICAL_COUNT="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-fs-report.json)"
          HIGH_COUNT="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-fs-report.json)"
          echo "critical=$CRITICAL_COUNT" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH_COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "### Trivy Filesystem Scan"
            echo ""
            echo "- Service path: \`${{ inputs.service_path }}\`"
            echo "- Critical: $CRITICAL_COUNT"
            echo "- High: $HIGH_COUNT"
            echo "- Artifact: \`trivy-fs-${{ needs.metadata.outputs.service_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload filesystem scan artifact
        if: inputs.upload_security_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-${{ needs.metadata.outputs.service_name }}
          path: trivy-fs-report.json
          retention-days: 7

      - name: Enforce filesystem scan policy
        shell: bash
        run: |
          if [ "${{ steps.fs_summary.outputs.critical }}" != "0" ] || [ "${{ steps.fs_summary.outputs.high }}" != "0" ]; then
            echo "Filesystem scan found HIGH/CRITICAL vulnerabilities."
            exit 1
          fi

  build:
    name: Build and Publish Image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - metadata
      - test
      - security
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    outputs:
      container_scan_passed: ${{ steps.scan_result.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate env file
        if: inputs.env_file_path != '' && (inputs.env_file_content != '' || inputs.env_file_var_name != '' || inputs.env_file_secret_name != '')
        env:
          ENV_FILE_CONTENT: ${{ inputs.env_file_content != '' && inputs.env_file_content || (inputs.env_file_secret_name != '' && secrets[inputs.env_file_secret_name]) || (inputs.env_file_var_name != '' && vars[inputs.env_file_var_name]) || '' }}
        shell: bash
        run: |
          if [ -z "$ENV_FILE_CONTENT" ]; then
            echo "Env file content resolved empty for ${{ inputs.env_file_path }}."
            exit 1
          fi
          mkdir -p "$(dirname "${{ inputs.env_file_path }}")"
          printf '%s\n' "$ENV_FILE_CONTENT" > "${{ inputs.env_file_path }}"

      - name: Authenticate to Google Cloud
        if: inputs.push_image
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.gcp_workload_identity_provider }}
          service_account: ${{ secrets.gcp_service_account }}

      - name: Validate registry auth inputs
        if: inputs.push_image
        shell: bash
        run: |
          if [ -z "${{ secrets.gcp_workload_identity_provider }}" ] || [ -z "${{ secrets.gcp_service_account }}" ]; then
            echo "GCP credentials are required when push_image=true."
            exit 1
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        if: inputs.push_image
        shell: bash
        run: gcloud auth configure-docker "${{ vars.DOCKER_REGISTRY_HOST }}" --quiet

      - name: Build and optionally push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.service_path }}
          push: ${{ inputs.push_image }}
          tags: ${{ needs.metadata.outputs.image_tag }}
          build-args: ${{ inputs.build_args }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        if: inputs.enable_security_scan && inputs.enable_image_scan && inputs.push_image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/trivy"
          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            -e TRIVY_USERNAME="oauth2accesstoken" \
            -e TRIVY_PASSWORD="$ACCESS_TOKEN" \
            aquasec/trivy:0.65.0 \
            image \
            --scanners vuln \
            --format json \
            --severity CRITICAL,HIGH \
            --pkg-types os,library \
            --output /workspace/trivy-image-report.json \
            "${{ needs.metadata.outputs.image_tag }}"

      - name: Summarize image scan
        if: inputs.enable_security_scan && inputs.enable_image_scan && inputs.push_image
        id: image_summary
        shell: bash
        run: |
          set -euo pipefail
          CRITICAL_COUNT="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-image-report.json)"
          HIGH_COUNT="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-image-report.json)"
          echo "critical=$CRITICAL_COUNT" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH_COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "### Trivy Image Scan"
            echo ""
            echo "- Image: \`${{ needs.metadata.outputs.image_tag }}\`"
            echo "- Critical: $CRITICAL_COUNT"
            echo "- High: $HIGH_COUNT"
            echo "- Artifact: \`trivy-image-${{ needs.metadata.outputs.service_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image scan artifact
        if: inputs.enable_security_scan && inputs.enable_image_scan && inputs.push_image && inputs.upload_security_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-${{ needs.metadata.outputs.service_name }}
          path: trivy-image-report.json
          retention-days: 7

      - name: Enforce image scan policy
        if: inputs.enable_security_scan && inputs.enable_image_scan && inputs.push_image
        shell: bash
        run: |
          if [ "${{ steps.image_summary.outputs.critical }}" != "0" ] || [ "${{ steps.image_summary.outputs.high }}" != "0" ]; then
            echo "Image scan found HIGH/CRITICAL vulnerabilities."
            exit 1
          fi

      - name: Mark scan result
        id: scan_result
        shell: bash
        run: |
          if [ "${{ inputs.enable_security_scan }}" = "true" ] && [ "${{ inputs.enable_image_scan }}" = "true" ] && [ "${{ inputs.push_image }}" = "true" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Create build metadata artifact
        if: inputs.upload_build_metadata
        shell: bash
        run: |
          mkdir -p build-info
          cat > build-info/build_info.json <<EOF
          {
            "service_name": "${{ needs.metadata.outputs.service_name }}",
            "service_path": "${{ inputs.service_path }}",
            "environment": "${{ inputs.environment }}",
            "image_tag": "${{ needs.metadata.outputs.image_tag }}",
            "git_sha": "${{ github.sha }}"
          }
          EOF

      - name: Upload build metadata artifact
        if: inputs.upload_build_metadata
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.artifact_name }}
          path: build-info/build_info.json
          retention-days: 7

      - name: Summary
        if: inputs.enable_summary
        shell: bash
        run: |
          {
            echo "### Build Summary"
            echo ""
            echo "- Service: ${{ needs.metadata.outputs.service_name }}"
            echo "- Environment: ${{ inputs.environment }}"
            echo "- Image: \`${{ needs.metadata.outputs.image_tag }}\`"
            echo "- Artifact: ${{ needs.metadata.outputs.artifact_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
