name: CI

on:
  workflow_call:
    inputs:
      service_path:
        description: 'Service path (e.g., services/my-service or apps/my-app)'
        required: true
        type: string
      environment:
        description: 'Environment (development/staging/production)'
        required: true
        type: string
      version_tag:
        description: 'Version tag for release/hotfix'
        required: false
        type: string
      image_tag:
        description: 'Docker image tag (overrides auto-generated tag)'
        required: false
        type: string
      push_image:
        description: 'Whether to push the Docker image'
        required: false
        type: boolean
        default: true
      enable_security_scan:
        description: 'Whether to enable security scanning'
        required: false
        type: boolean
        default: true
      build_args:
        description: 'Additional build arguments for Docker'
        required: false
        type: string
        default: ''
    secrets:
      gcp_workload_identity_provider:
        description: 'GCP Workload Identity Provider'
        required: true
      gcp_service_account:
        description: 'GCP Service Account'
        required: true
    outputs:
      image_tag:
        description: 'Docker image tag that was pushed'
        value: ${{ jobs.build.outputs.image_tag }}
      container_scan_passed:
        description: 'Whether container security scan passed'
        value: ${{ jobs.build.outputs.scan_passed }}

jobs:
  # Phase 1: Test & Security (Parallel for speed)
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      test_passed: ${{ steps.result.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Service
        id: setup
        run: |
          SERVICE_PATH="${{ inputs.service_path }}"
          cd "$SERVICE_PATH" || exit 1

          # Detect service type and setup
          if [ -f "pom.xml" ]; then
            echo "type=java" >> $GITHUB_OUTPUT
            echo "setup_command=echo 'Java service detected'" >> $GITHUB_OUTPUT
            echo "test_command=mvn test -B" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "type=nodejs" >> $GITHUB_OUTPUT
            echo "setup_command=npm ci || npm install" >> $GITHUB_OUTPUT
            echo "test_command=npm test -- --coverage --watchAll=false" >> $GITHUB_OUTPUT
          elif [ -f "pyproject.toml" ] || [ -f "requirements.txt" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
            if [ -f "pyproject.toml" ]; then
              echo "setup_command=pip install uv && uv pip install --system -e ." >> $GITHUB_OUTPUT
              echo "test_command=uv run pytest || python -m pytest || pip install pytest && pytest" >> $GITHUB_OUTPUT
            else
              echo "setup_command=pip install -r requirements.txt" >> $GITHUB_OUTPUT
              echo "test_command=python -m pytest || pytest" >> $GITHUB_OUTPUT
            fi
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
            echo "setup_command=echo 'Unknown service type'" >> $GITHUB_OUTPUT
            echo "test_command=echo 'No tests configured'" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        run: |
          cd "${{ inputs.service_path }}"
          ${{ steps.setup.outputs.setup_command }}

      - name: Run Tests
        id: test
        run: |
          cd "${{ inputs.service_path }}"
          ${{ steps.setup.outputs.test_command }}

      - name: Test Result
        id: result
        run: echo "passed=true" >> $GITHUB_OUTPUT

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: inputs.enable_security_scan == true
    outputs:
      scan_passed: ${{ steps.result.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Service
        id: setup
        run: |
          SERVICE_PATH="${{ inputs.service_path }}"
          cd "$SERVICE_PATH" || exit 1

          # Detect service type
          if [ -f "pom.xml" ]; then
            echo "type=java" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "type=nodejs" >> $GITHUB_OUTPUT
          elif [ -f "pyproject.toml" ] || [ -f "requirements.txt" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy SAST Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-ref: '${{ inputs.service_path }}'
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Run Trivy Dependency Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-ref: '${{ inputs.service_path }}'
          scan-type: 'fs'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Security Result
        id: result
        run: echo "passed=true" >> $GITHUB_OUTPUT

  # Phase 2: Build & Publish (only if test + security passed or security disabled)
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [test, security]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (inputs.enable_security_scan == false || needs.security.result == 'success')
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      scan_passed: ${{ steps.scan.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.gcp_workload_identity_provider }}
          service_account: ${{ secrets.gcp_service_account }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Google Artifact Registry
        run: |
          gcloud auth configure-docker asia-southeast2-docker.pkg.dev --quiet

      - name: Extract Service Name
        id: meta
        run: |
          SERVICE_PATH="${{ inputs.service_path }}"
          SERVICE_NAME=$(basename "$SERVICE_PATH")

          # Determine project ID based on environment
          if [ "${{ inputs.environment }}" = "development" ]; then
            PROJECT_ID="${{ vars.DOCKER_PROJECT_ID_DEVELOPMENT }}"
          elif [ "${{ inputs.environment }}" = "staging" ]; then
            PROJECT_ID="${{ vars.DOCKER_PROJECT_ID_STAGING }}"
          elif [ "${{ inputs.environment }}" = "production" ]; then
            PROJECT_ID="${{ vars.DOCKER_PROJECT_ID_PRODUCTION }}"
          else
            echo "Unknown environment: ${{ inputs.environment }}"
            exit 1
          fi

          # Determine image tag
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [ "${{ inputs.environment }}" = "development" ]; then
            IMAGE_TAG="latest"
          elif [ -n "${{ inputs.version_tag }}" ]; then
            IMAGE_TAG="${{ inputs.version_tag }}"
          else
            IMAGE_TAG="${{ github.sha }}"
          fi

          REGISTRY="${{ vars.DOCKER_REGISTRY_HOST }}"
          REPO="${{ vars.DOCKER_REPO_GLOBAL }}"

          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=$REGISTRY/$PROJECT_ID/$REPO/$SERVICE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: "${{ inputs.service_path }}"
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta.outputs.image_tag }}
          build-args: ${{ inputs.build_args }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container Security Scan
        id: scan
        if: inputs.enable_security_scan == true && inputs.push_image == true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.meta.outputs.image_tag }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Scan Result
        if: inputs.enable_security_scan == true && inputs.push_image == true
        run: echo "passed=true" >> $GITHUB_OUTPUT

      - name: Build Summary
        run: |
          echo "### Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ steps.meta.outputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ steps.meta.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
