name: Reusable Docker Build (No Push)

on:
  workflow_call:
    inputs:
      dockerfile_path:
        description: 'Path to the Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      build_context:
        description: 'Build context path'
        required: false
        type: string
        default: '.'
      image_name:
        description: 'Name of the Docker image to build'
        required: true
        type: string
      image_tag:
        description: 'Tag for the Docker image'
        required: false
        type: string
        default: 'latest'
      platform:
        description: 'Target platform for the build (e.g., linux/amd64, linux/arm64)'
        required: false
        type: string
        default: 'linux/amd64'
      build_args:
        description: 'Build arguments as JSON object (e.g., {"NODE_ENV":"production"})'
        required: false
        type: string
        default: '{}'
      cache:
        description: 'Enable Docker build cache'
        required: false
        type: boolean
        default: true

    outputs:
      image_digest:
        description: 'Digest of the built image'
        value: ${{ jobs.build.outputs.image_digest }}
      image_id:
        description: 'ID of the built image'
        value: ${{ jobs.build.outputs.image_id }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_id: ${{ steps.meta.outputs.id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          tags: ${{ inputs.image_tag }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.platform }}
          tags: ${{ inputs.image_name }}:${{ inputs.image_tag }}
          build-args: ${{ inputs.build_args }}
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Export image info
        run: |
          echo "Image built successfully!"
          echo "Image: ${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Image ID: ${{ steps.meta.outputs.id }}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.image_tag }}
          path: /tmp/image.tar
          retention-days: 7
