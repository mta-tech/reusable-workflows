# .github/workflows/ci-pipeline-reusable.yml
# Example workflow that demonstrates using reusable workflows
# Copy this to test-pipeline and customize as needed

name: CI - Pipeline (Reusable Example)

on:
  push:
    branches:
      - 'feat/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    types: [closed]
    branches:
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  # ============================================
  # Step 1: Detect Changed Services
  # ============================================
  detect-changes:
    name: Detect Changed Services
    uses: ./.github/workflows/ci-change-detection-reusable.yml
    with:
      service_roots: 'apps,services'
      detect_version_tags: true

  # ============================================
  # Step 2: Build and Push Services
  # ============================================
  build-services:
    name: Build Services
    needs: detect-changes
    if: needs.detect-changes.outputs.service_count > 0
    strategy:
      fail-fast: false
      matrix:
        service_path: ${{ fromJson(needs.detect-changes.outputs.services) }}

    uses: ./.github/workflows/ci-build-reusable.yml
    with:
      service_path: ${{ matrix.service_path }}
      image_tag: ${{ needs.detect-changes.outputs.version_tag }}
      push_image: true
      enable_security_scan: false
    secrets:
      gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

  # ============================================
  # Step 3: Deploy via GitOps
  # ============================================
  deploy-services:
    name: Deploy Services
    needs: [detect-changes, build-services]
    if: success() && needs.detect-changes.outputs.service_count > 0
    uses: ./.github/workflows/ci-deploy-gitops-reusable.yml
    with:
      gitops_repo: ${{ vars.GITOPS_REPO }}
      environment: ${{ needs.detect-changes.outputs.environment }}
      download_artifacts: true
      workflow_run_id: ${{ github.run_id }}
    secrets:
      gh_pat: ${{ secrets.GH_PAT }}

  # ============================================
  # Step 4: Send Notifications
  # ============================================
  notify-success:
    name: Notify Success
    needs: [detect-changes, build-services, deploy-services]
    if: success() && needs.detect-changes.outputs.service_count > 0
    uses: ./.github/workflows/ci-notification-reusable.yml
    with:
      status: success
      environment: ${{ needs.detect-changes.outputs.environment }}
      workflow_name: CI Pipeline
      services: ${{ needs.deploy-services.outputs.deployed_services }}
      branch: ${{ github.ref_name }}
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify-failure:
    name: Notify Failure
    needs: [detect-changes, build-services, deploy-services]
    if: failure()
    uses: ./.github/workflows/ci-notification-reusable.yml
    with:
      status: failure
      environment: ${{ needs.detect-changes.outputs.environment }}
      workflow_name: CI Pipeline
      services: ${{ needs.detect-changes.outputs.services }}
      branch: ${{ github.ref_name }}
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  # ============================================
  # Step 5: No Changes Notification
  # ============================================
  notify-no-changes:
    name: Notify No Changes
    needs: detect-changes
    if: needs.detect-changes.outputs.service_count == 0
    uses: ./.github/workflows/ci-notification-reusable.yml
    with:
      status: success
      environment: ${{ needs.detect-changes.outputs.environment }}
      workflow_name: CI Pipeline
      custom_message: "No service changes detected. Build skipped."
      branch: ${{ github.ref_name }}
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
