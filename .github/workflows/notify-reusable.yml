name: Notify

on:
  workflow_call:
    inputs:
      status:
        description: "Pipeline status."
        required: true
        type: string
      environment:
        description: "Target environment."
        required: false
        default: ""
        type: string
      service_name:
        description: "Optional service name."
        required: false
        default: ""
        type: string
      version_tag:
        description: "Optional version tag."
        required: false
        default: ""
        type: string
      workflow_name:
        description: "Workflow display name."
        required: false
        default: ""
        type: string
      run_url:
        description: "Workflow run URL override."
        required: false
        default: ""
        type: string
      enable_discord:
        description: "Send Discord notification when a webhook is configured."
        required: false
        default: true
        type: boolean
      enable_slack:
        description: "Send Slack notification when a webhook is configured."
        required: false
        default: true
        type: boolean
    secrets:
      DISCORD_WEBHOOK:
        description: "Discord incoming webhook."
        required: false
      SLACK_WEBHOOK_URL:
        description: "Slack incoming webhook."
        required: false
      SLACK_BOT_TOKEN:
        description: "Optional Slack bot token for richer Slack delivery."
        required: false

permissions:
  actions: read
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Prepare payload metadata
        id: payload
        shell: bash
        run: |
          RUN_URL="${{ inputs.run_url }}"
          if [ -z "$RUN_URL" ]; then
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          WORKFLOW_NAME="${{ inputs.workflow_name }}"
          if [ -z "$WORKFLOW_NAME" ]; then
            WORKFLOW_NAME="${{ github.workflow }}"
          fi

          ENVIRONMENT="${{ inputs.environment }}"
          if [ -z "$ENVIRONMENT" ]; then
            ENVIRONMENT="n/a"
          fi

          SERVICE_NAME="${{ inputs.service_name }}"
          if [ -z "$SERVICE_NAME" ]; then
            SERVICE_NAME="n/a"
          fi

          VERSION_TAG="${{ inputs.version_tag }}"
          if [ -z "$VERSION_TAG" ]; then
            VERSION_TAG="n/a"
          fi

          REPOSITORY="${{ github.repository }}"
          REF_NAME="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          STATUS_RAW="${{ inputs.status }}"
          case "$STATUS_RAW" in
            success)
              STATUS_LABEL="SUCCESS"
              STATUS_EMOJI="✅"
              STATUS_COLOR="3066993"
              STATUS_TITLE="Succeeded"
              ;;
            failure)
              STATUS_LABEL="FAILURE"
              STATUS_EMOJI="⚠️"
              STATUS_COLOR="15158332"
              STATUS_TITLE="Failed"
              ;;
            cancelled)
              STATUS_LABEL="CANCELLED"
              STATUS_EMOJI="⏹️"
              STATUS_COLOR="9807270"
              STATUS_TITLE="Cancelled"
              ;;
            *)
              STATUS_LABEL="$(printf '%s' "$STATUS_RAW" | tr '[:lower:]' '[:upper:]')"
              STATUS_EMOJI="ℹ️"
              STATUS_COLOR="3447003"
              STATUS_TITLE="$STATUS_LABEL"
              ;;
          esac

          WORKFLOW_TITLE="$WORKFLOW_NAME"

          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
          echo "workflow_name=$WORKFLOW_NAME" >> "$GITHUB_OUTPUT"
          echo "workflow_title=$WORKFLOW_TITLE" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "service_name=$SERVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "repository=$REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "status_label=$STATUS_LABEL" >> "$GITHUB_OUTPUT"
          echo "status_title=$STATUS_TITLE" >> "$GITHUB_OUTPUT"
          echo "status_emoji=$STATUS_EMOJI" >> "$GITHUB_OUTPUT"
          echo "status_color=$STATUS_COLOR" >> "$GITHUB_OUTPUT"

      - name: Download build metadata artifacts
        id: build_metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SERVICE_NAME: ${{ inputs.service_name }}
        run: |
          set -euo pipefail

          mkdir -p notify-artifacts

          artifact_names="$(
            gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
              --paginate \
              --jq '.artifacts[] | select(.expired == false and (.name | startswith("build-info-"))) | .name' \
              || true
          )"

          if [ -z "$artifact_names" ]; then
            echo "image_tag_map={}" >> "$GITHUB_OUTPUT"
            echo "primary_image_tag=" >> "$GITHUB_OUTPUT"
            echo "service_display=n/a" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r artifact_name; do
            [ -n "$artifact_name" ] || continue
            gh run download "${{ github.run_id }}" \
              --repo "${{ github.repository }}" \
              --name "$artifact_name" \
              --dir "notify-artifacts/$artifact_name" \
              >/dev/null
          done <<< "$artifact_names"

          image_tag_map="$(
            find notify-artifacts -name build_info.json -print0 \
              | xargs -0 jq -sc '
                  map({
                    (.service_name): (
                      .image_tag
                      | split("/")
                      | last
                    )
                  })
                  | add // {}
                ' \
              2>/dev/null \
              || echo '{}'
          )"

          echo "image_tag_map<<EOF" >> "$GITHUB_OUTPUT"
          echo "$image_tag_map" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          primary_image_tag="$(
            jq -rn \
              --argjson image_tag_map "$image_tag_map" \
              --arg service_name "$SERVICE_NAME" '
                if ($service_name != "" and $service_name != "n/a" and ($image_tag_map[$service_name] // "") != "") then
                  $image_tag_map[$service_name]
                elif ($image_tag_map | length) == 1 then
                  ($image_tag_map | to_entries[0].value)
                else
                  ""
                end
              '
          )"

          service_display="$(
            jq -rn \
              --argjson image_tag_map "$image_tag_map" \
              --arg service_name "$SERVICE_NAME" '
                if ($service_name != "" and $service_name != "n/a") then
                  $service_name
                else
                  ($image_tag_map | keys | sort) as $services
                  | if ($services | length) == 0 then
                      "n/a"
                    elif ($services | length) <= 3 then
                      ($services | join(", "))
                    else
                      (($services[0:3] | join(", ")) + " +" + ((($services | length) - 3) | tostring) + " more")
                    end
                end
              '
          )"

          echo "primary_image_tag=$primary_image_tag" >> "$GITHUB_OUTPUT"
          echo "service_display=$service_display" >> "$GITHUB_OUTPUT"

      - name: Build notification summary
        id: summary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_TAG_MAP: ${{ steps.build_metadata.outputs.image_tag_map }}
        run: |
          image_tag_map_json="$(printf '%s' "${IMAGE_TAG_MAP:-}" | jq -c . 2>/dev/null || echo '{}')"

          commit_message="$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" --jq '.commit.message' 2>/dev/null || true)"
          commit_message="${commit_message%%$'\n'*}"
          if [ -z "$commit_message" ] || [ "$commit_message" = "null" ]; then
            commit_message="n/a"
          fi

          jobs_json="$(gh run view "${{ github.run_id }}" --repo "${{ github.repository }}" --json jobs)"

          summary_lines="$(printf '%s' "$jobs_json" | jq -r --argjson image_tag_map "$image_tag_map_json" '
            def icon(c):
              if c == "success" then "✅"
              elif c == "failure" then "❌"
              elif c == "cancelled" then "⏹️"
              elif c == "skipped" then "⏭️"
              else "ℹ️"
              end;
            def suffix(c):
              if c == "failure" then " (Failed)"
              elif c == "cancelled" then " (Cancelled)"
              else ""
              end;
            def display_label(n):
              if (n | startswith("build_standard (")) then
                ((n | capture("^build_standard \\([^,]+, (?<svc>[^\\)]+)\\)$").svc) + " build")
              elif n == "build_claim_mind_web_staging" then
                "claim-mind-web [staging] build"
              elif n == "build_claim_mind_web_prod_ready" then
                "claim-mind-web [prod-ready] build"
              elif n == "build_portal_staging" then
                "claim-mind-developer-portal-web [staging] build"
              elif n == "build_portal_prod_ready" then
                "claim-mind-developer-portal-web [prod-ready] build"
              elif n == "build_claim_mind_web" then
                "claim-mind-web build"
              elif n == "build_portal" then
                "claim-mind-developer-portal-web build"
              elif (n | startswith("deploy_gitops (")) then
                ((n | capture("^deploy_gitops \\([^,]+, (?<svc>[^,\\)]+)").svc) + " deploy")
              elif n == "deploy_gitops" then
                "gitops deploy"
              elif (n | startswith("deploy_cloudrun (")) then
                ((n | capture("^deploy_cloudrun \\([^,]+, (?<svc>[^,\\)]+)").svc) + " deploy")
              elif n == "deploy_cloudrun" then
                "cloudrun deploy"
              elif n == "tag_release" then
                "release tag"
              elif n == "tag_hotfix" then
                "hotfix tag"
              elif n == "rollback" then
                "rollback"
              else
                empty
              end;
            def image_key(n):
              if (n | startswith("build_standard (")) then
                (n | capture("^build_standard \\([^,]+, (?<svc>[^\\)]+)\\)$").svc)
              elif (n | startswith("deploy_gitops (")) then
                (n | capture("^deploy_gitops \\([^,]+, (?<svc>[^,\\)]+)").svc)
              elif (n | startswith("deploy_cloudrun (")) then
                (n | capture("^deploy_cloudrun \\([^,]+, (?<svc>[^,\\)]+)").svc)
              elif n == "build_claim_mind_web_staging" or n == "build_claim_mind_web_prod_ready" or n == "build_claim_mind_web" then
                "claim-mind-web"
              elif n == "build_portal_staging" or n == "build_portal_prod_ready" or n == "build_portal" then
                "claim-mind-developer-portal-web"
              else
                null
              end;
            [
              .jobs[]
              | select(.name != "notify / notify")
              | select(.conclusion != "skipped")
              | .label = display_label(.name)
              | select(.label != null and .label != "")
              | .image_ref = ((image_key(.name) as $key | if $key == null then "" else ($image_tag_map[$key] // "") end))
              | "\((icon(.conclusion))) `\(.label)`" +
                (if .image_ref != "" then " -> `\(.image_ref)`" else "" end) +
                "\((suffix(.conclusion)))"
            ] | join("\n")
          ')"

          if [ -z "$summary_lines" ]; then
            summary_lines="No build or deploy jobs were executed."
          fi

          echo "summary_lines<<EOF" >> "$GITHUB_OUTPUT"
          echo "$summary_lines" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "commit_message<<EOF" >> "$GITHUB_OUTPUT"
          echo "$commit_message" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        if: inputs.enable_discord && env.DISCORD_WEBHOOK != ''
        shell: bash
        env:
          WORKFLOW_TITLE: ${{ steps.payload.outputs.workflow_title }}
          STATUS_EMOJI: ${{ steps.payload.outputs.status_emoji }}
          STATUS_TEXT: ${{ steps.payload.outputs.status_title }}
          ENVIRONMENT: ${{ steps.payload.outputs.environment }}
          SERVICE_NAME: ${{ steps.build_metadata.outputs.service_display }}
          VERSION_TAG: ${{ steps.payload.outputs.version_tag }}
          REPOSITORY: ${{ steps.payload.outputs.repository }}
          BRANCH_NAME: ${{ steps.payload.outputs.ref_name }}
          ACTOR_NAME: ${{ steps.payload.outputs.actor }}
          SHORT_SHA: ${{ steps.payload.outputs.short_sha }}
          COMMIT_MESSAGE: ${{ steps.summary.outputs.commit_message }}
          SUMMARY_LINES: ${{ steps.summary.outputs.summary_lines }}
          PRIMARY_IMAGE_TAG: ${{ steps.build_metadata.outputs.primary_image_tag }}
          RUN_URL: ${{ steps.payload.outputs.run_url }}
          STATUS_COLOR: ${{ steps.payload.outputs.status_color }}
        run: |
          payload="$(jq -n \
            --arg workflow "$WORKFLOW_TITLE" \
            --arg status_emoji "$STATUS_EMOJI" \
            --arg status "$STATUS_TEXT" \
            --arg environment "$ENVIRONMENT" \
            --arg service "$SERVICE_NAME" \
            --arg version "$VERSION_TAG" \
            --arg repository "$REPOSITORY" \
            --arg branch "$BRANCH_NAME" \
            --arg actor "$ACTOR_NAME" \
            --arg commit "$SHORT_SHA" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg summary_lines "$SUMMARY_LINES" \
            --arg primary_image_tag "$PRIMARY_IMAGE_TAG" \
            --arg run_url "$RUN_URL" \
            --argjson color "$STATUS_COLOR" \
            '{
              content: "",
              embeds: [
                {
                  author: {
                    name: "GitHub Notification",
                    url: $run_url
                  },
                  title: ($status_emoji + " " + $workflow + " " + $status),
                  url: $run_url,
                  color: $color,
                  description:
                    ("**Release Tag:** `" + $version + "`\n" +
                     "**Commit:** `" + $commit_message + "`\n" +
                     "**Environment:** `" + $environment + "`\n" +
                     "**Triggered By:** `" + $actor + "`\n" +
                     (if $primary_image_tag != "" then "**Image Tag:** `" + $primary_image_tag + "`\n" else "" end) +
                     "\n" +
                     "**Build Summary:**\n" + $summary_lines),
                  fields: [
                    {name: "Service", value: ("`" + $service + "`"), inline: true},
                    {name: "Branch", value: ("`" + $branch + "`"), inline: true},
                    {name: "Repository", value: ("`" + $repository + "`"), inline: false},
                    {name: "Commit SHA", value: ("`" + $commit + "`"), inline: true},
                    {name: "Workflow Run", value: "[Open Workflow Run](\($run_url))", inline: true}
                  ],
                  footer: {
                    text: "GitHub Actions Notification"
                  }
                }
              ]
            }'
          )"

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK"

      - name: Prepare Slack payload
        id: slack_payload
        if: inputs.enable_slack
        shell: bash
        env:
          WORKFLOW_NAME: ${{ steps.payload.outputs.workflow_name }}
          WORKFLOW_TITLE: ${{ steps.payload.outputs.workflow_title }}
          STATUS_EMOJI: ${{ steps.payload.outputs.status_emoji }}
          STATUS_TITLE: ${{ steps.payload.outputs.status_title }}
          VERSION_TAG: ${{ steps.payload.outputs.version_tag }}
          COMMIT_MESSAGE: ${{ steps.summary.outputs.commit_message }}
          ENVIRONMENT: ${{ steps.payload.outputs.environment }}
          ACTOR_NAME: ${{ steps.payload.outputs.actor }}
          SERVICE_NAME: ${{ steps.build_metadata.outputs.service_display }}
          SUMMARY_LINES: ${{ steps.summary.outputs.summary_lines }}
          PRIMARY_IMAGE_TAG: ${{ steps.build_metadata.outputs.primary_image_tag }}
          REPOSITORY: ${{ steps.payload.outputs.repository }}
          BRANCH_NAME: ${{ steps.payload.outputs.ref_name }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          SHORT_SHA: ${{ steps.payload.outputs.short_sha }}
          RUN_URL: ${{ steps.payload.outputs.run_url }}
        run: |
          payload="$(jq -cn \
            --arg workflow_name "$WORKFLOW_NAME" \
            --arg workflow_title "$WORKFLOW_TITLE" \
            --arg status_emoji "$STATUS_EMOJI" \
            --arg status_title "$STATUS_TITLE" \
            --arg version_tag "$VERSION_TAG" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg environment "$ENVIRONMENT" \
            --arg actor "$ACTOR_NAME" \
            --arg service_name "$SERVICE_NAME" \
            --arg summary_lines "$SUMMARY_LINES" \
            --arg primary_image_tag "$PRIMARY_IMAGE_TAG" \
            --arg repository "$REPOSITORY" \
            --arg branch_name "$BRANCH_NAME" \
            --arg commit_url "$COMMIT_URL" \
            --arg short_sha "$SHORT_SHA" \
            --arg run_url "$RUN_URL" \
            '{
              text: ($status_emoji + " " + $workflow_name),
              blocks: [
                {
                  type: "header",
                  text: {
                    type: "plain_text",
                    text: ($status_emoji + " " + $workflow_title + " " + $status_title)
                  }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Release Tag:*\n`" + $version_tag + "`") },
                    { type: "mrkdwn", text: ("*Commit:*\n`" + $commit_message + "`") },
                    { type: "mrkdwn", text: ("*Environment:*\n" + $environment) },
                    { type: "mrkdwn", text: ("*Triggered By:*\n`" + $actor + "`") },
                    { type: "mrkdwn", text: ("*Service:*\n`" + $service_name + "`") }
                  ]
                },
                (if $primary_image_tag != "" then
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: ("*Image Tag:*\n`" + $primary_image_tag + "`") }
                    ]
                  }
                 else empty end),
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*Build Summary:*\n" + $summary_lines)
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: ("Repository: `" + $repository + "` • Branch: `" + $branch_name + "` • Commit: <" + $commit_url + "|`" + $short_sha + "`>")
                    }
                  ]
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "Open Workflow Run" },
                      url: $run_url
                    }
                  ]
                }
              ]
            }')"

          echo "payload<<EOF" >> "$GITHUB_OUTPUT"
          echo "$payload" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        if: inputs.enable_slack && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ env.SLACK_CHANNEL_ID }}
          payload: ${{ steps.slack_payload.outputs.payload }}
        env:
          SLACK_BOT_TOKEN: ${{ env.SLACK_BOT_TOKEN }}

      - name: Send Slack webhook notification
        if: inputs.enable_slack && !(env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != '') && env.SLACK_WEBHOOK != ''
        shell: bash
        run: |
          payload='${{ steps.slack_payload.outputs.payload }}'

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$SLACK_WEBHOOK"
